[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/_lib/vertex-creds.enc", "node_modules/sql.js/dist/sql-wasm.wasm"]

[functions."api-analyze-traffic"]
  timeout = 26

[functions."api-media-generation"]
  timeout = 26

[functions."api-media-analysis"]
  timeout = 26

[functions."api-generate-ads-script"]
  timeout = 26

# DB Maintenance: runs daily at 03:00 UTC
[functions."api-db-maintenance"]
  schedule = "0 3 * * *"

# Security: Allow Gemini API key in client bundle (VITE_* vars are intentionally public)
[build.processing]
  skip_processing = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"
    # Cross-Origin Isolation (Required for Whisper Web / SharedArrayBuffer)
    # same-origin-allow-popups: Keeps Google Login popups working
    # credentialless: Modern COEP that doesn't require explicit CORP for cross-origin resources
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "credentialless"
    # Content Security Policy (CSP)
    # ────────────────────────────────────────────────────────────────────────
    # unsafe-eval: removed — Vite production bundles do not require it.
    # unsafe-inline: kept for JSON-LD and analytics pixels.
    # wasm-unsafe-eval: required for FFmpeg.wasm (video processing).
    # blob:: required for web workers and FFmpeg.wasm.
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: 'inline-speculation-rules' https://challenges.cloudflare.com https://accounts.google.com https://www.google.com https://google.com https://www.gstatic.com https://generativelanguage.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://www.googleadservices.com https://googleadservices.com https://www.googletagservices.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://*.googleusercontent.com https://*.googleapis.com https://insitu.company https://ui-avatars.com https://www.transparenttextures.com https://storage.googleapis.com https://cdn.pixabay.com https://pixabay.com https://*.franklinsanchez.com https://franklinsanchez.com https://www.google-analytics.com https://www.googletagmanager.com https://*.google.com https://google.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://googleadservices.com https://www.googletagservices.com; media-src 'self' data: blob: https://storage.googleapis.com https://cdn.pixabay.com https://pixabay.com; connect-src 'self' data: blob: https://images.unsplash.com https://*.googleapis.com https://insitu.company https://*.netlify.app https://*.supabase.co https://ingesteer.services-prod.nsvcs.net https://*.google.com https://google.com https://google.com.ec https://fonts.gstatic.com https://cdn.pixabay.com https://pixabay.com https://*.franklinsanchez.com https://franklinsanchez.com https://www.google-analytics.com https://stats.g.doubleclick.net https://www.googleadservices.com https://googleadservices.com https://www.googletagservices.com https://googleads.g.doubleclick.net; frame-src 'self' https://challenges.cloudflare.com https://accounts.google.com https://www.google.com https://www.gstatic.com;"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(self)"

[[headers]]
  for = "/extension*.html"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline'; frame-ancestors *;"

[[headers]]
  for = "/cws-*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline'; frame-ancestors *;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/blog-images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/pwa-*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

